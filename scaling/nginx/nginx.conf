# ─────────────────────────────────────────────────────────────────────────────
#  NGINX Load Balancer Configuration
#  Demonstrates: Round Robin (default), health checks, request distribution
# ─────────────────────────────────────────────────────────────────────────────

# ── Worker processes ──────────────────────────────────────────────────────────
# "auto" matches the number of CPU cores available
worker_processes auto;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ── Upstream pool ─────────────────────────────────────────────────────────
    # Docker Compose resolves "web" to ALL container IPs for that service.
    # NGINX will round-robin across them automatically.
    upstream web_pool {
        # Round Robin is the default — no keyword needed.
        # Swap in "least_conn;" or "ip_hash;" to experiment with other strategies.
        server web:3000;

        # Keepalive connections to backends (improves throughput)
        keepalive 32;
    }

    # ── Logging format ────────────────────────────────────────────────────────
    log_format  main  '$remote_addr → $upstream_addr  '
                      '[$time_local]  "$request"  $status  '
                      'upstream_response_time=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Pass ALL traffic through the upstream pool
        location / {
            proxy_pass         http://web_pool;
            proxy_http_version 1.1;

            # Required for keepalive connections
            proxy_set_header   Connection        "";

            # Forward client info to backend
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # NGINX status page — useful to monitor connection counts
        location /nginx-status {
            stub_status on;
            allow all;
        }
    }
}
